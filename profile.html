<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | UnityHub</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="sidebar-overlay"></div>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation">
      <div class="sidebar-logo">
        <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="22" fill="#E8EAF6"/><circle cx="16" cy="20" r="6" fill="#3F51B5"/><circle cx="32" cy="20" r="6" fill="#5C6BC0"/><circle cx="24" cy="32" r="6" fill="#7986CB"/></svg>
        <div><span>UnityHub</span><span class="sidebar-tagline">Connect. Collaborate. Create Impact.</span></div>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg> Dashboard</a>
        <a href="events.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/></svg> Events</a>
        <a href="resources.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg> Resources</a>
        <a href="organization.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> Organizations</a>
        <a href="#" class="nav-item nav-item-messages"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg> Messages</a>
        <a href="notifications.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg> Notifications</a>
        <a href="profile.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Profile</a>
        <a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg> Settings</a>
      </nav>
      <div class="sidebar-footer">
        <button type="button" class="btn-logout"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg> Logout</button>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="topbar">
        <button type="button" class="menu-toggle" aria-label="Open menu"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/></svg></button>
        <div class="search-bar">
          <input type="search" id="global-search" placeholder="Search for events, organizations, or resources...">
        </div>
        <div class="topbar-actions">
          <a href="notifications.html" class="btn-icon" style="position:relative;text-decoration:none;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg>
            <span class="notification-dot"></span>
          </a>
          <a href="profile.html" class="user-profile" style="text-decoration:none;">
            <img src="" alt="" class="user-avatar">
            <div class="user-info"><span class="user-name">User</span><span class="user-role">Role</span></div>
          </a>
        </div>
      </header>

      <main class="main-content">
        <div class="card profile-header-card">
          <img src="" alt="" class="profile-avatar-lg" id="profile-avatar">
          <div class="profile-info">
            <h2 id="profile-name">—</h2>
            <p id="profile-role">—</p>
            <p id="profile-email">—</p>
          </div>
          <button type="button" class="btn btn-outline" id="edit-profile-btn">Edit Profile</button>
        </div>

        <div class="profile-edit-form" id="profile-edit-form">
          <div class="form-group">
            <label for="edit-name">Full Name</label>
            <input type="text" id="edit-name">
          </div>
          <div class="form-group">
            <label for="edit-email">Email</label>
            <input type="email" id="edit-email" readonly>
            <p style="font-size:0.75rem;color:var(--text-muted);">Email cannot be changed</p>
          </div>
          <div class="form-group">
            <label for="edit-role">Role</label>
            <select id="edit-role">
              <option value="Student">Student</option>
              <option value="Student Organization">Student Organization</option>
              <option value="NSTP/CWTS Member">NSTP/CWTS Member</option>
              <option value="Community Volunteer">Community Volunteer</option>
            </select>
          </div>
          <div style="display:flex;gap:0.75rem;">
            <button type="button" class="btn btn-primary" id="save-profile">Save Changes</button>
            <button type="button" class="btn btn-outline" id="cancel-profile">Cancel</button>
          </div>
        </div>

        <h2 class="section-title" style="margin-top:1.5rem;">Your Activity</h2>
        <div class="activity-stats">
          <div class="activity-stat-card"><strong id="stat-events">0</strong><span>Events Registered</span></div>
          <div class="activity-stat-card"><strong id="stat-saved">0</strong><span>Resources Saved</span></div>
          <div class="activity-stat-card"><strong id="stat-borrows">0</strong><span>Borrow Requests</span></div>
        </div>

        <div class="card" style="margin-top:1.5rem; padding: 1rem;">
          <h2 class="section-title">Registered Events</h2>
          <div id="registered-events-list"></div>
        </div>
        <div class="card" style="margin-top:1.5rem; padding: 1rem;">
          <h2 class="section-title">Borrow Requests</h2>
          <div id="borrow-requests-list"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/ui-icons.js"></script>
  <script src="js/events-data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui-enhancements.js"></script>
  <script src="js/app.js"></script>
  <script>
    const EVENT_MAP = {
      'event-coastal': 'Coastal Clean-up Drive',
      'event-literacy': 'Literacy Workshop for Kids',
      'event-health': 'Community Health Fair',
      'event-summit': 'Barangay Youth Summit',
      'event-tree': 'Tree Planting Initiative',
    };

    function renderProfile() {
      const user = UH.getCurrentUser();
      if (!user) return;

      document.getElementById('profile-avatar').src = user.avatar;
      document.getElementById('profile-name').textContent = user.name;
      document.getElementById('profile-role').textContent = user.role;
      document.getElementById('profile-email').textContent = user.email;

      document.getElementById('stat-events').textContent = UH.getRegistrations().length;
      document.getElementById('stat-saved').textContent = UH.getSaved().length;
      document.getElementById('stat-borrows').textContent = UH.getBorrowRequests().length;

      const regList = document.getElementById('registered-events-list');
      const regs = UH.getRegistrations();
      regList.innerHTML = regs.length === 0
        ? '<p style="color:var(--text-secondary);font-size:0.9rem;">No registered events. <a href="events.html">Browse events</a></p>'
        : '';
      regs.forEach((id) => {
        const row = document.createElement('div');
        row.className = 'profile-list-item';
        row.innerHTML = `<span>${EVENT_MAP[id] || id}</span>`;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn btn-outline btn-sm';
        btn.textContent = 'Cancel Registration';
        btn.addEventListener('click', () => {
          UH.cancelRegistration(id);
          renderProfile();
          if (UnityHub.showToast) UnityHub.showToast('Registration cancelled.');
        });
        row.appendChild(btn);
        regList.appendChild(row);
      });

      const borrowList = document.getElementById('borrow-requests-list');
      const borrows = UH.getBorrowRequests();
      borrowList.innerHTML = borrows.length === 0
        ? '<p style="color:var(--text-secondary);font-size:0.9rem;">No borrow requests yet.</p>'
        : '';
      borrows.forEach((b) => {
        const row = document.createElement('div');
        row.className = 'profile-list-item';
        const badgeClass = b.status === 'approved' ? 'badge-available' : 'badge-pending';
        const badgeLabel = b.status === 'approved' ? 'Approved' : 'Pending';
        row.innerHTML = `
          <div>
            <strong style="font-size:0.9rem;">${b.resourceName}</strong>
            <p style="font-size:0.8rem;color:var(--text-muted);">${b.org} · ${b.requestedAt}</p>
          </div>
          <span class="badge ${badgeClass}">${badgeLabel}</span>
        `;
        borrowList.appendChild(row);
      });
    }

    const editBtn = document.getElementById('edit-profile-btn');
    const editForm = document.getElementById('profile-edit-form');

    editBtn.addEventListener('click', () => {
      const user = UH.getCurrentUser();
      document.getElementById('edit-name').value = user.name;
      document.getElementById('edit-email').value = user.email;
      document.getElementById('edit-role').value = user.role;
      editForm.classList.add('visible');
    });

    document.getElementById('cancel-profile').addEventListener('click', () => {
      editForm.classList.remove('visible');
    });

    document.getElementById('save-profile').addEventListener('click', () => {
      UH.updateUser({
        name: document.getElementById('edit-name').value.trim(),
        role: document.getElementById('edit-role').value,
      });
      editForm.classList.remove('visible');
      renderProfile();
      const user = UH.getCurrentUser();
      document.querySelectorAll('.user-name').forEach((el) => { el.textContent = user.name; });
      document.querySelectorAll('.user-role').forEach((el) => { el.textContent = user.role; });
      if (UnityHub.showToast) UnityHub.showToast('Profile updated successfully', 'success');
    });

    renderProfile();
  </script>
</body>
</html>
