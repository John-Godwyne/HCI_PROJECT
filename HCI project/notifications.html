        <button type="button" class="btn-logout"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg> Logout</button>

    <div class="main-wrapper">
      <header class="topbar">
        <button type="button" class="menu-toggle" aria-label="Open menu"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/></svg></button>

          <input type="search" id="global-search" placeholder="Search for events, organizations, or resources...">
        </div>
        <div class="topbar-actions">
          <a href="notifications.html" class="btn-icon" aria-label="Notifications" style="position:relative;text-decoration:none;">

            <span class="notification-dot"></span>
          </a>
          <a href="profile.html" class="user-profile" style="text-decoration:none;">
            <img src="" alt="" class="user-avatar">
            <div class="user-info"><span class="user-name">User</span><span class="user-role">Role</span></div>
          </a>
        </div>
      </header>

      <main class="main-content">
        <div class="page-header-row">
          <header class="page-header">
            <h1>Notifications</h1>
            <p>Registration confirmations, reminders, and organization updates.</p>
          </header>
          <button type="button" class="btn btn-outline btn-sm" id="mark-all-read">Mark all as read</button>
        </div>
        <div id="notifications-list"></div>
        <div id="notifications-empty" class="empty-state" style="display:none;">
          <h3>No notifications</h3>
          <p>You're all caught up!</p>
        </div>
      </main>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/ui-enhancements.js"></script>
  <script src="js/app.js"></script>
  <script>
    function renderNotifications() {
      const list = document.getElementById('notifications-list');
      const empty = document.getElementById('notifications-empty');
      const items = UH.getNotifications();
      list.innerHTML = '';
      if (items.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      items.forEach((n) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'notif-page-item' + (n.read ? '' : ' unread');
        btn.innerHTML = `
          <div class="notif-icon-wrap">${n.icon || '🔔'}</div>
          <div class="notif-body"><strong>${n.title}</strong><p>${n.body}</p></div>
          <span class="notif-time">${n.time}</span>
        `;
        btn.addEventListener('click', () => {
          UH.markNotificationRead(n.id);
          renderNotifications();
          if (window.UnityHub && UnityHub.updateNotificationDot) UnityHub.updateNotificationDot();
        });
        list.appendChild(btn);
      });
    }

    document.getElementById('mark-all-read').addEventListener('click', () => {
      UH.markAllRead();
      renderNotifications();
      if (window.UnityHub && UnityHub.updateNotificationDot) UnityHub.updateNotificationDot();
      if (window.UnityHub && UnityHub.showToast) UnityHub.showToast('All notifications marked as read.');
    });

    renderNotifications();
  </script>
</body>
</html>
